name: CI/CD Pipeline - act3_repo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ETAPA 1: Build (equivale a AWS CodeBuild)
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js (o el lenguaje que uses)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          echo "Instalando dependencias..."
          npm install || echo "No hay package.json, continuando..."

      - name: Compilar/Construir proyecto
        run: |
          echo "Construyendo el proyecto..."
          npm run build || echo "Sin script de build, continuando..."

  # ETAPA 2: Test
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Ejecutar pruebas
        run: |
          echo "Ejecutando pruebas..."
          npm test || echo "Sin pruebas configuradas, continuando..."

  # ETAPA 3: Deploy (equivale al Deploy Stage de CodePipeline)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Simular despliegue
        run: |
          echo "✅ Desplegando aplicación en ambiente de producción..."
          echo "Pipeline completado exitosamente."